<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#6366F1"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-width="16"
    stroke-dasharray="20 14" fill="none" opacity="0.25"/>
  <circle cx="256" cy="256" r="110" stroke="white" stroke-width="20"
    stroke-dasharray="18 12" fill="none" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="40" fill="white"/>

  <!-- Sweep line -->
  <line x1="256" y1="256" x2="390" y2="140"
    stroke="#22D3EE" stroke-width="14"
    stroke-linecap="round" opacity="0.9"/>

  <!-- Accent dot on sweep -->
  <circle cx="370" cy="158" r="12" fill="#22D3EE"/>
</svg>